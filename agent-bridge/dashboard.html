// ==================== POLLING ====================

function poll() {
  var pp = activeProject ? '&project=' + encodeURIComponent(activeProject) : '';
  var pq = activeProject ? '?project=' + encodeURIComponent(activeProject) : '';
  var pollStart = Date.now();
  Promise.all([
    fetch('/api/history?limit=500' + pp).then(function(r) { return r.json(); }),
    fetch('/api/agents' + pq).then(function(r) { return r.json(); }),
    fetch('/api/status' + pq).then(function(r) { return r.json(); }),
  ]).then(function(results) {
    updateConnectionInfo(Date.now() - pollStart);
    var prevHistLen = cachedHistory.length;
    cachedHistory = results[0];
    cachedAgents = results[1];
    var status = results[2];

    // Browser notification for new messages
    if (prevHistLen > 0 && cachedHistory.length > prevHistLen) {
      sendBrowserNotification(cachedHistory[cachedHistory.length - 1]);
    }

    document.getElementById('stat-messages').textContent = status.messageCount;
    document.getElementById('stat-agents').textContent = status.agentCount;
    document.getElementById('stat-sleeping').textContent = status.sleepingCount || 0;
    document.getElementById('stat-threads').textContent = status.threadCount;

    // Update tab title with message count
    document.title = status.messageCount > 0
      ? 'Let Them Talk (' + status.messageCount + ')'
      : 'Let Them Talk';

    renderAgents(cachedAgents);
    renderAgentStats();
    renderThreads(cachedHistory);
    if (!replayActive) renderMessages(cachedHistory);
    renderPinnedMessages();
    renderBookmarksSidebar();
    fetchActivity();
    updateTypingIndicator(cachedAgents);
    if (activeView === 'tasks') fetchTasks();
  }).catch(function(e) {
    console.error('Poll failed:', e);
    document.getElementById('conn-detail').textContent = ' err';
  });
}

function doReset() {
  if (!confirm('Clear all messages, agents, and history?')) return;
  fetch('/api/reset', { method: 'POST' }).then(function() {
    lastMessageCount = 0;
    activeThread = null;
    cachedHistory = [];
    cachedAgents = {};
    poll();
  }).catch(function(e) { console.error('Reset failed:', e); });
}

// ==================== PROJECT MANAGEMENT ====================

function loadProjects() {
  fetch('/api/projects').then(function(r) { return r.json(); }).then(function(projects) {
    var sel = document.getElementById('project-select');
    // Keep the first option (Default)
    while (sel.options.length > 1) sel.remove(1);
    for (var i = 0; i < projects.length; i++) {
      var opt = document.createElement('option');
      opt.value = projects[i].path;
      opt.textContent = projects[i].name;
      sel.appendChild(opt);
    }
    if (activeProject) sel.value = activeProject;

    // Show/hide remove button
    document.getElementById('remove-project-btn').style.display = activeProject ? '' : 'none';
  }).catch(function() {});
}

function switchProject() {
  activeProject = document.getElementById('project-select').value;
  lastMessageCount = 0;
  document.getElementById('remove-project-btn').style.display = activeProject ? '' : 'none';
  poll();
}

function showAddProject() {
  var input = document.getElementById('project-path-input');
  if (input.classList.contains('visible')) {
    input.classList.remove('visible');
  } else {
    input.classList.add('visible');
    input.focus();
  }
}

function addProject() {
  var input = document.getElementById('project-path-input');
  var projectPath = input.value.trim();
  if (!projectPath) return;

  fetch('/api/projects', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ path: projectPath })
  }).then(function(r) { return r.json(); }).then(function(res) {
    if (res.success) {
      input.value = '';
      input.classList.remove('visible');
      loadProjects();
    } else {
      alert(res.error || 'Failed to add project');
    }
  }).catch(function(e) { console.error('Add project failed:', e); });
}

function discoverProjects() {
  var resultsEl = document.getElementById('discover-results');
  resultsEl.style.display = 'block';
  resultsEl.innerHTML = '<div style="font-size:11px;color:var(--text-muted);padding:4px;">Scanning...</div>';

  fetch('/api/discover').then(function(r) { return r.json(); }).then(function(found) {
    if (!found.length) {
      resultsEl.innerHTML = '<div style="font-size:11px;color:var(--text-muted);padding:4px;">No new projects found nearby</div>';
      setTimeout(function() { resultsEl.style.display = 'none'; }, 3000);
      return;
    }
    var html = '';
    for (var i = 0; i < found.length; i++) {
      html += '<div class="thread-item discover-item" data-path="' + escapeHtml(found[i].path) + '" data-name="' + escapeHtml(found[i].name) + '" style="margin-bottom:4px;cursor:pointer">' +
        '<div class="thread-preview">' + escapeHtml(found[i].name) + '</div>' +
        '<div class="thread-meta">' + escapeHtml(found[i].path) + '</div>' +
      '</div>';
    }
    resultsEl.innerHTML = html;
    // Attach click handlers via event delegation (avoids inline onclick XSS)
    resultsEl.querySelectorAll('.discover-item').forEach(function(el) {
      el.addEventListener('click', function() {
        addDiscovered(this.dataset.path, this.dataset.name);
      });
    });
  }).catch(function() {
    resultsEl.innerHTML = '<div style="font-size:11px;color:var(--red);padding:4px;">Discovery failed</div>';
  });
}

function addDiscovered(projectPath, name) {
  fetch('/api/projects', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ path: projectPath, name: name })
  }).then(function(r) { return r.json(); }).then(function(res) {
    if (res.success) {
      document.getElementById('discover-results').style.display = 'none';
      loadProjects();
    }
  }).catch(function() {});
}

function removeProject() {
  if (!activeProject) return;
  if (!confirm('Remove this project from the dashboard?')) return;

  fetch('/api/projects', {
    method: 'DELETE',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ path: activeProject })
  }).then(function(r) { return r.json(); }).then(function(res) {
    if (res.success) {
      activeProject = '';
      document.getElementById('project-select').value = '';
      loadProjects();
      poll();
    }
  }).catch(function(e) { console.error('Remove project failed:', e); });
}

// ==================== SOUND NOTIFICATIONS ====================

var soundEnabled = false;
var audioCtx = null;

function toggleSound() {
  soundEnabled = !soundEnabled;
  var btn = document.getElementById('sound-toggle');
  if (soundEnabled) {
    btn.classList.add('active');
    btn.innerHTML = '&#x1f50a;';
    // Init audio context on first user interaction
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  } else {
    btn.classList.remove('active');
    btn.innerHTML = '&#x1f508;';
  }
}

function playNotifSound() {
  if (!audioCtx) return;
  try {
    var osc = audioCtx.createOscillator();
    var gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.frequency.value = 800;
    osc.type = 'sine';
    gain.gain.value = 0.08;
    gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.15);
    osc.start(audioCtx.currentTime);
    osc.stop(audioCtx.currentTime + 0.15);
  } catch (e) {}
}

// ==================== TYPING INDICATOR ====================

function updateTypingIndicator(agents) {
  var typing = [];
  var keys = Object.keys(agents);
  for (var i = 0; i < keys.length; i++) {
    var info = agents[keys[i]];
    // Agent is alive, not listening, and was recently active (processing a message)
    if (info.alive && !info.is_listening && info.status === 'active') {
      typing.push(keys[i]);
    }
  }
  var bar = document.getElementById('typing-bar');
  if (typing.length > 0) {
    var text = typing.join(', ') + (typing.length === 1 ? ' is' : ' are') + ' processing';
    bar.innerHTML = text + '<span class="typing-dots"><span></span><span></span><span></span></span>';
    bar.classList.add('visible');
  } else {
    bar.classList.remove('visible');
  }
}

// ==================== CONNECTION QUALITY ====================

var lastPollTime = 0;
var pollLatency = 0;

function updateConnectionInfo(latency) {
  pollLatency = latency;
  var detail = document.getElementById('conn-detail');
  if (latency < 100) {
    detail.textContent = ' ' + latency + 'ms';
  } else if (latency < 500) {
    detail.textContent = ' ' + latency + 'ms';
  } else {
    detail.textContent = ' slow';
  }
}

// ==================== REPLAY MODE ====================

var replayActive = false;
var replayPlaying = false;
var replayPosition = 0;
var replaySpeed = 1;
var replayTimer = null;

function enterReplay() {
  if (!cachedHistory.length) return;
  replayActive = true;
  replayPosition = 0;
  replayPlaying = false;
  document.getElementById('replay-bar').classList.add('visible');
  document.getElementById('view-tabs').style.display = 'none';
  document.getElementById('search-bar').style.display = 'none';
  document.getElementById('replay-slider').max = cachedHistory.length;
  document.getElementById('replay-slider').value = 0;
  document.getElementById('replay-header-btn').style.display = 'none';
  renderReplayMessages();
}

function exitReplay() {
  replayActive = false;
  replayPlaying = false;
  if (replayTimer) { clearTimeout(replayTimer); replayTimer = null; }
  document.getElementById('replay-bar').classList.remove('visible');
  document.getElementById('view-tabs').style.display = '';
  document.getElementById('search-bar').style.display = '';
  document.getElementById('replay-header-btn').style.display = '';
  lastMessageCount = 0;
  renderMessages(cachedHistory);
}

function onReplaySlider() {
  replayPosition = parseInt(document.getElementById('replay-slider').value);
  renderReplayMessages();
}

function replayPlayPause() {
  replayPlaying = !replayPlaying;
  document.getElementById('replay-play').innerHTML = replayPlaying ? '&#x23F8;' : '&#x25B6;';
  if (replayPlaying) replayAdvance();
}

function setReplaySpeed(speed) {
  replaySpeed = speed;
  var speeds = [0.5, 1, 2, 5];
  for (var i = 0; i < speeds.length; i++) {
    var id = 'speed-' + String(speeds[i]).replace('.', '');
    var el = document.getElementById(id);
    if (el) el.classList.toggle('active', speeds[i] === speed);
  }
}

function replayAdvance() {
  if (!replayPlaying || !replayActive) return;
  if (replayPosition < cachedHistory.length) {
    replayPosition++;
    document.getElementById('replay-slider').value = replayPosition;
    renderReplayMessages();
    replayTimer = setTimeout(replayAdvance, 1000 / replaySpeed);
  } else {
    replayPlaying = false;
    document.getElementById('replay-play').innerHTML = '&#x25B6;';
  }
}

function renderReplayMessages() {
  var el = document.getElementById('messages');
  document.getElementById('replay-progress').textContent = replayPosition + ' / ' + cachedHistory.length;

  if (replayPosition === 0) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">&#x23F5;</div><div class="empty-text">Press play or drag the slider</div></div>';
    return;
  }

  var slice = cachedHistory.slice(0, replayPosition);
  var html = '';
  for (var i = 0; i < slice.length; i++) {
    var m = slice[i];
    var color = getColor(m.from);

    // Time gap between messages
    if (i > 0) {
      var gap = new Date(m.timestamp).getTime() - new Date(slice[i-1].timestamp).getTime();
      if (gap > 5000) {
        var gapText = '';
        var gapSecs = Math.floor(gap / 1000);
        if (gapSecs < 60) gapText = gapSecs + ' seconds later';
        else if (gapSecs < 3600) gapText = Math.floor(gapSecs / 60) + 'm ' + (gapSecs % 60) + 's later';
        else gapText = Math.floor(gapSecs / 3600) + 'h later';
        html += '<div class="time-gap">&#x23F1; ' + gapText + '</div>';
      }
    }

    var isLast = (i === slice.length - 1);
    var newClass = isLast ? ' message-new' : '';

    html += '<div class="message' + newClass + '">' +
      '<div class="msg-avatar" style="background:' + color + '">' + initial(m.from) + '</div>' +
      '<div class="msg-body">' +
        '<div class="msg-header">' +
          '<span class="msg-from" style="color:' + color + '">' + escapeHtml(m.from) + '</span>' +
          '<span class="msg-arrow">&rarr;</span>' +
          '<span class="msg-to">' + escapeHtml(m.to) + '</span>' +
          '<span class="msg-time">' + formatTime(m.timestamp) + '</span>' +
        '</div>' +
        '<div class="msg-content">' + renderMarkdown(m.content) + '</div>' +
      '</div></div>';
  }
  el.innerHTML = html;
  el.scrollTop = el.scrollHeight;
}

// ==================== BROWSER NOTIFICATIONS ====================

var notifEnabled = localStorage.getItem('ltt-notif') === 'true';
var notifPermission = Notification ? Notification.permission : 'denied';

function toggleNotifications() {
  if (!notifEnabled) {
    if (notifPermission !== 'granted') {
      Notification.requestPermission().then(function(perm) {
        notifPermission = perm;
        if (perm === 'granted') {
          notifEnabled = true;
          localStorage.setItem('ltt-notif', 'true');
          updateNotifBtn();
        }
      });
    } else {
      notifEnabled = true;
      localStorage.setItem('ltt-notif', 'true');
    }
  } else {
    notifEnabled = false;
    localStorage.setItem('ltt-notif', 'false');
  }
  updateNotifBtn();
}

function updateNotifBtn() {
  var btn = document.getElementById('notif-toggle');
  if (notifEnabled) {
    btn.classList.add('active');
    btn.innerHTML = '&#x1f514;';
  } else {
    btn.classList.remove('active');
    btn.innerHTML = '&#x1f515;';
  }
}

function sendBrowserNotification(msg) {
  if (!notifEnabled || notifPermission !== 'granted') return;
  if (document.hasFocus()) return; // Only notify when tab is in background
  try {
    var preview = msg.content.substring(0, 80);
    var n = new Notification(msg.from + ' sent a message', {
      body: preview,
      icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><rect rx="20" width="100" height="100" fill="%230d1117"/><path d="M20 30 Q20 20 30 20 H70 Q80 20 80 30 V55 Q80 65 70 65 H55 L40 80 V65 H30 Q20 65 20 55Z" fill="%2358a6ff"/></svg>',
      tag: 'ltt-' + msg.id
    });
    n.onclick = function() { window.focus(); n.close(); };
  } catch (e) {}
}

updateNotifBtn();

// ==================== SSE + POLLING ====================

var sseConnected = false;

function initSSE() {
  try {
    var eventSource = new EventSource('/api/events');
    eventSource.onmessage = function(e) {
      if (e.data === 'update' || e.data === 'connected') {
        poll();
      }
    };
    eventSource.onopen = function() {
      sseConnected = true;
      document.getElementById('conn-label').textContent = 'Live (SSE)';
    };
    eventSource.onerror = function() {
      if (sseConnected) {
        sseConnected = false;
        document.getElementById('conn-label').textContent = 'Live (poll)';
        console.warn('SSE disconnected, falling back to polling');
        eventSource.close();
        setInterval(poll, POLL_INTERVAL);
      }
    };
  } catch (e) {
    // SSE not supported — use polling
    setInterval(poll, POLL_INTERVAL);
  }
}

// ==================== INIT ====================
loadProjects();
poll();
initSSE();
// Safety-net poll at 10s (SSE handles real-time, this catches any missed updates)
setInterval(poll, 10000);
</script>
