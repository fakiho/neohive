<textarea id="post" readonly>Hey everyone 🙂

I wanted to share a free tool I built that has genuinely transformed how I work on my projects — in ways I can't even describe.

I'm a developer working on two projects simultaneously, and I've been working with AI tools for several years. Over the past year I've mainly been using Ollama, private models, Claude (Opus), Codex CLI, and Gemini CLI — each one with a different role for different purposes.

After countless hours with these tools — development, headaches, and everything in between — I decided to stop and streamline my workflow. Instead of working with multiple terminals, talking to each one separately for different tasks, and sometimes accidentally talking to the wrong AI — that's where Let Them Talk comes in.

And no, this isn't another platform that spawns agents behind the scenes where you have no idea what's happening, need to teach each one from scratch, write root-level instructions for every agent, optimize so they don't waste tokens, etc.

So what is Let Them Talk?

In short — a tool that lets AI terminals talk to each other. No websites, no cloud, no sign-up. Everything runs locally on your machine.

Say you're working on a project and you have three terminals open — Claude writing code, Gemini doing code review, and Codex running tests. Instead of YOU being the bridge between them, manually passing messages, copying answers from one terminal to another — they just talk directly to each other.

How does it work?

One command in the terminal:

npx let-them-talk init

That's it. Every AI terminal you open in your project folder automatically gets MCP tools for sending and receiving messages. You give each one a role, they register, and they start working together.

What surprised me the most is how quickly my workflow changed. Instead of me sitting there passing information between the agents — they coordinate on their own. One finishes a task and hands it off to the next, the second reviews and sends back comments, the third fixes. And me? I sit back and watch it all happen in real time on the dashboard.

🖥️ Web dashboard that shows the entire conversation between agents live — who's talking to who, who's active, who's idle, tasks, workflows, and more. You can also send messages from the dashboard directly to any agent.

📱 Phone access — hit a button on the dashboard, scan a QR code, and you can see everything from your phone on the same WiFi network. Personally, this is how I work — computer running, me on the couch with my phone watching the agents do their thing 😎

Key features:
— Supports Claude Code, Gemini CLI, Codex CLI (and even Ollama)
— 27 MCP tools — messaging, tasks, workflows, workspaces, branching, plugins
— Web dashboard with real-time updates (SSE)
— Multi-project management from a single dashboard
— Fully local — no cloud, no API keys for the tool itself
— Open source and 100% free

💎 Web: https://talk.unrealai.studio/
🔗 GitHub: https://github.com/Dekelelz/let-them-talk
📦 NPM: npx let-them-talk init
💬 Discord: https://discord.gg/6Y9YgkFNJP

Usage guide available on the website under Docs. More updates and improvements are on the way, so keep an eye on the site.

My recommended workflow: Open a few terminals, give each one a name so you can identify them, and only talk through the first terminal which acts as a project manager — all tasks get dispatched to the other terminals through it, they respond to it and it responds to them. This keeps the system clean and stable. (Meanwhile all other terminals run in listen mode, waiting for messages.)

You can also let them talk freely to each other without restrictions, but it gets a bit chaotic — I'll be improving that soon for those who want that kind of setup.

Would love to hear what you think, and if you have questions I'm here 🙌</textarea>
